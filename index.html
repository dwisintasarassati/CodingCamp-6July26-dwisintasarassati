<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>


    <!-- CSS -->
     <link rel="stylesheet" href="css/style.css">

    <!-- Chart.js -->
     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    
    <div class="container">
        <!-- Header -->
         <header>
            <h1>Expense & Budget Visualizer</h1>
         </header>

        <!-- balance -->
         <section class="balance-card">
            <p class="balance-title">Total Balance</p>
            <h2 id="balance">$0.00</h2>
            <p id="warningMessage" class="warning-message"></p>
         </section>

         <!-- Add Transaction -->
         <section class="form-card">
            <h3>Add Transaction</h3>
            <form id="transactionForm">
                <label for="itemName">Nama Item</label>
                <input
                type="text"
                id="itemName"
                placeholder="Enter item name">

                <label for="amount">Amount</label>
                <input
                    type="number"
                    id="amount"
                    placeholder="Enter amount">

                <label for="category">Kategori</label>
                <select id="category">
                    <option value="">Select Category</option>
                        <option value="Food">Makanan</option>
                        <option value="Transport">Tranportasi</option>
                        <option value="Fun">Hiburan</option>
                </select>

                <div class="custom-category">
                    <input
                        type="text"
                        id="newCategory"
                        placeholder="New Category">
                    <button
                        type="button"
                        id="addCategoryBtn"> Add category
                    </button>
                </div>

                <!-- Bottom Section -->
                <button type="submit">Add Transaction</button>

                <section class="bottom-section">

                    <!-- Transaction List -->
                     <div class="transaction-card">
                        <h3>Transaksi</h3>
                        <div id="transactionList" class="transaction-list">
                        </div>
                     </div>
                    
                    <!-- Mengkategorikan berdasarkan amount terendah ke tertinggi, amount tertinggi ke terendah, dan kategori berdasarkan abjad -->
                        <div class="sort-container">
                            <label for="sortOption">Sort By</label>
                            <select id="sortOption">
                            <option value="default">Default</option>
                            <option value="amountAsc">Amount (Low to High)</option>
                            <option value="amountDesc">Amount (High to Low)</option>
                            <option value="category">Category (A-Z)</option>
                            </select>
                        </div>
                    
                    <!-- Chart -->
                     <div class="chart-card">
                        <h3>Spending by Category</h3>
                        <canvas id="expenseChart"></canvas>
                        
                     </div>
                </section>
            </form>
         </section>
    </div>
    
    <!-- JavaScript -->
     <script src="script.js"></script>

</body>
</html>
